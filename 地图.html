<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcGIS Online 地图展示系统</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.29/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        #header {
            height: 60px;
            background: linear-gradient(90deg, #1e88e5, #0d47a1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        #mapArea {
            flex: 1;
            position: relative;
        }

        #basemapGallery {
            width: 280px;
            background: #f5f5f5;
            border-left: 1px solid #ddd;
            padding: 15px;
            overflow-y: auto;
        }

        #basemapGallery h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 2px solid #1e88e5;
        }

        .esri-legend {
            width: 220px !important;
        }
    </style>
</head>
<body>
    <div id="header">
        ArcGIS Online 地图展示系统
    </div>

    <div id="main-container">
        <div id="mapArea"></div>
        <div id="basemapGallery">
            <h3>底图切换</h3>
        </div>
    </div>

    <script>
        require([
            "esri/Map",
            "esri/views/MapView",
            "esri/widgets/BasemapGallery",
            "esri/widgets/ScaleBar",
            "esri/widgets/Legend",
            "esri/widgets/Search",
            "esri/widgets/LayerList",
            "esri/layers/FeatureLayer"
        ], function(Map, MapView, BasemapGallery, ScaleBar, Legend, Search, LayerList, FeatureLayer) {

            // 1. 创建地图对象
            const map = new Map({
                basemap: "streets-navigation-vector"
            });

            // 2. 创建地图视图并添加错误监听
            const view = new MapView({
                container: "mapArea",
                map: map,
                center: [116.403874, 39.914885],
                zoom: 12
            });

            // 监听视图加载完成事件
            view.when(function() {
                console.log("地图视图加载成功！");
            }, function(error) {
                console.error("地图视图加载失败：", error);
                alert("地图加载失败，请检查网络连接！");
            });

            // 3. 加载ArcGIS Online公开专题图层（替换为稳定的公共图层）
            const featureLayer = new FeatureLayer({
                url: "https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/World_Cities/FeatureServer/0",
                title: "世界主要城市",
                outFields: ["*"]
            });
            map.add(featureLayer);

            // 4. 添加微件
            const scaleBar = new ScaleBar({ view: view, unit: "metric" });
            view.ui.add(scaleBar, "bottom-left");

            const legend = new Legend({ view: view });
            view.ui.add(legend, "top-right");

            const search = new Search({ view: view });
            view.ui.add(search, "top-left");

            const layerList = new LayerList({ view: view });
            view.ui.add(layerList, "bottom-right");

            // 5. 底图库微件
            const basemapGallery = new BasemapGallery({
                view: view,
                container: "basemapGallery"
            });
        });
    </script>
</body>
</html>
